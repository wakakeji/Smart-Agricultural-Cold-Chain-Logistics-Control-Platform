services:
  # MySQL 业务主库
  mysql:
    image: mysql:8.4.6
    container_name: local-mysql
    pull_policy: never
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "app_db"
      MYSQL_DEFAULT_AUTH: mysql_native_password
    volumes:
      - ./mysql_data:/var/lib/mysql
    restart: unless-stopped

  # Redis 单机缓存
  redis:
    image: redis:7.4.5
    container_name: local-redis
    pull_policy: never
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "123456", "--appendonly yes"]
    volumes:
      - ./redis_data:/data
    restart: unless-stopped

  # RabbitMQ：业务AMQP + 物联网MQTT
  rabbitmq:
    image: rabbitmq:4.1.3-management
    container_name: local-rabbitmq
    pull_policy: never
    ports:
      - "5672:5672"
      - "15672:15672"
      - "1883:1883"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: 123456
    volumes:
      - ./rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    command: ["sh", "-c", "rabbitmq-plugins enable rabbitmq_mqtt rabbitmq_management && rabbitmq-server"]

  # InfluxDB 温湿度时序数据库
  influxdb:
    image: influxdb:2.9.1
    container_name: local-influxdb
    pull_policy: never
    ports:
      - "8086:8086"
    volumes:
      - influx_data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345678
      DOCKER_INFLUXDB_INIT_ORG: coldChain
      DOCKER_INFLUXDB_INIT_BUCKET: sensor_data
    restart: unless-stopped

  # MongoDB 存储系统日志（替代ELK）
  mongo:
    image: mongo:8.0.12
    container_name: local-mongo
    pull_policy: never
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: 123456
    restart: unless-stopped

  # Python AI算法服务基础环境
  python:
    image: python:3.10-slim
    container_name: local-python
    pull_policy: never
    volumes:
      - ./ai_service:/app
    ports:
      - "8000:8000"
    restart: unless-stopped
    command: ["sleep", "infinity"]

# 持久化数据卷
volumes:
  influx_data:
  mongo_data: