server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: cold-chain-platform
  profiles:
    active: dev
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# JWT 配置
coldchain:
  jwt:
    secret: cold-chain-jwt-secret-key-change-me-in-production-2026
    expire-seconds: 86400
    remember-expire-seconds: 604800
  auth:
    max-fail-count: 5
    lock-minutes: 15